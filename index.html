<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Terrazza Duomo 21</title>
<style>
:root {
  --bg: #f4f1ec;
  --bg2: #ffffff;
  --bg3: #e8e4dc;
  --gold: #9a7820;
  --gold2: #c9a940;
  --gold-bg: #fdf6e3;
  --dark: #1a1510;
  --mid: #5c5244;
  --muted: #8c7d6a;
  --border: #cec8be;
  --border2: #b0a898;
  --red: #c0392b;
  --rsm: 7px;
  --gap: 5px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:-apple-system,"SF Pro Text","Helvetica Neue",Arial,sans-serif;color:var(--dark);display:flex;flex-direction:column;max-width:430px;margin:0 auto;}

/* HEADER */
.hdr{flex-shrink:0;background:var(--dark);padding-top:max(env(safe-area-inset-top,14px),14px);}
.hdr-inner{display:flex;align-items:center;justify-content:center;position:relative;padding:8px 14px 6px;}
.hdr-logo{display:flex;align-items:center;justify-content:center;flex:1;}
.hdr-clock{text-align:right;flex-shrink:0;position:absolute;right:14px;top:50%;transform:translateY(-50%);}
.hclock-date{font-size:9px;color:#6a5e4c;letter-spacing:.05em;}
.hclock-time{font-size:17px;font-weight:700;color:#e8dfc8;}
.nav{display:flex;border-top:1px solid rgba(255,255,255,.08);}
.ntab{flex:1;padding:9px 0 7px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#5a5040;background:none;border:none;cursor:pointer;position:relative;}
.ntab.on{color:var(--gold2);}
.ntab.on::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2px;background:var(--gold2);border-radius:2px;}

/* PAGES */
.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 10px 80px;opacity:0;pointer-events:none;transition:opacity .18s;}
.page.on{opacity:1;pointer-events:all;}

/* MAP SECTIONS */
.sec-lbl{font-size:8px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:8px 0 5px 1px;}
.sec-div{height:1px;background:var(--border);margin:7px 0;}

/* Base table button — always gold border when free */
.t{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-radius:var(--rsm);border:2px solid var(--gold2);background:#ffffff;cursor:pointer;position:relative;transition:all .15s;width:100%;aspect-ratio:1;min-height:0;}
.t:active{transform:scale(.91);}
/* OCCUPIED — red fill + red border */
.t.act{background:#e53935;border-color:#c62828;}
.t.act .tname,.t.act .tname-sm{color:#fff;}
.t.act .tinfo{color:#ffcdd2;}
/* MULTI — red border only (previous clients have data, current is empty) */
.t.multi{border-color:#c62828;border-width:2.5px;}
.tname{font-size:11px;font-weight:800;color:var(--dark);line-height:1;}
.tname-sm{font-size:9px;font-weight:800;color:var(--dark);line-height:1.1;text-align:center;}
.tinfo{font-size:8px;font-weight:700;color:#fff;line-height:1;}
.tdot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:#fff;opacity:.85;}

/* SHEET */
.sov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s;}
.sov.on{opacity:1;pointer-events:all;}
.sheet{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:var(--bg);border-radius:20px 20px 0 0;border-top:2px solid var(--border2);z-index:51;max-height:92vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:max(env(safe-area-inset-bottom,0px),0px);}
.sheet.on{transform:translateY(0);}
.shandle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.shdr{padding:10px 16px 9px;border-bottom:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.stitle{font-size:21px;font-weight:300;font-style:italic;color:var(--dark);}
.stitle b{font-weight:800;font-style:normal;color:var(--gold);}
.sclose{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:700;color:var(--mid);}
.sbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px;}
.sfoot{padding:9px 16px 7px;border-top:1.5px solid var(--border);flex-shrink:0;display:flex;gap:9px;}

.slbl{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:16px 0 8px;}
.slbl:first-child{margin-top:0;}
.ctabs{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.ctab{padding:6px 13px;border-radius:20px;border:2px solid var(--border);background:var(--bg2);font-size:12px;font-weight:700;color:var(--mid);cursor:pointer;display:flex;align-items:center;gap:4px;}
.ctab.on{background:var(--dark);color:#fff;border-color:var(--dark);}
.ctx{opacity:.5;font-size:10px;}
.ctnew{padding:6px 11px;border-radius:20px;border:2px dashed var(--border2);background:none;font-size:11px;font-weight:700;color:var(--gold);cursor:pointer;}
.bcard{background:var(--bg2);border:2px solid var(--border);border-radius:var(--rsm);padding:11px;margin-bottom:8px;}
.br1{display:flex;gap:7px;align-items:center;margin-bottom:8px;}
.br2{display:flex;gap:7px;align-items:center;}
select,input[type=text]{background:var(--bg3);border:2px solid var(--border2);border-radius:7px;color:var(--dark);font-family:-apple-system,sans-serif;font-size:15px;font-weight:500;padding:9px 10px;width:100%;-webkit-appearance:none;outline:none;}
select:focus,input:focus{border-color:var(--gold2);}
.qctrl{display:flex;align-items:center;gap:9px;background:var(--bg3);border:2px solid var(--border2);border-radius:7px;padding:6px 9px;flex-shrink:0;}
.qctrl button{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;width:20px;text-align:center;font-weight:900;line-height:1;}
.qctrl span{font-size:16px;font-weight:800;color:var(--dark);min-width:20px;text-align:center;}
.bdel{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;margin-left:auto;}
.badd{width:100%;padding:12px;background:none;border:2px dashed var(--border2);border-radius:var(--rsm);color:var(--gold);font-family:-apple-system,sans-serif;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.scard{background:var(--bg2);border:2px solid var(--border);border-radius:var(--rsm);padding:9px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;user-select:none;transition:all .12s;}
.scard:active{transform:scale(.91);}
.scard.on{border-color:var(--gold2);background:var(--gold-bg);}
.sn{font-size:9px;font-weight:700;color:var(--mid);text-align:center;line-height:1.2;}
.scnt{display:flex;align-items:center;gap:5px;}
.scnt button{background:var(--bg3);border:2px solid var(--border2);border-radius:5px;width:26px;height:26px;color:var(--dark);font-size:18px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.scnt button:active{background:var(--border2);}
.scnt span{font-size:17px;font-weight:800;color:var(--dark);min-width:16px;text-align:center;}
.tbar{display:flex;margin-top:16px;background:var(--dark);border-radius:var(--rsm);overflow:hidden;}
.titem{flex:1;padding:12px 5px;text-align:center;}
.tdiv{width:1px;background:rgba(255,255,255,.1);}
.tval{font-size:26px;font-weight:800;color:var(--gold2);line-height:1;}
.tval.over{color:#ff6b6b;}
.tlbl{font-size:7px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7a6a54;margin-top:2px;}
.bconf{flex:1;padding:14px;background:var(--dark);color:#fff;border:none;border-radius:var(--rsm);font-family:-apple-system,sans-serif;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;}
.bconf:active{opacity:.85;}
.bdanger{padding:14px 14px;background:none;color:var(--red);border:2px solid rgba(192,57,43,.3);border-radius:var(--rsm);font-size:11px;font-weight:700;cursor:pointer;}

/* REPORT */
.rtop{background:var(--dark);border-radius:var(--rsm);padding:18px 16px;margin-bottom:14px;}
.rbrand{font-size:24px;font-weight:300;font-style:italic;color:#fff;}
.rbrand b{font-weight:800;font-style:normal;color:var(--gold2);}
.rsub{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#6a5c46;margin-top:2px;}
.rdate{font-size:11px;color:#a89070;margin-top:7px;}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.kpi{background:var(--bg2);border:2px solid var(--border);border-radius:var(--rsm);padding:12px 6px;text-align:center;}
.kval{font-size:30px;font-weight:800;color:var(--gold);line-height:1;}
.klbl{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.rsec{margin-bottom:16px;}
.rslbl{font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.rtable{width:100%;border-collapse:collapse;}
.rtable th{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:6px 8px;border-bottom:2px solid var(--border);text-align:left;}
.rtable td{font-size:13px;color:var(--dark);padding:9px 8px;border-bottom:1px solid var(--border);vertical-align:top;}
.rtable td.rnum{text-align:right;font-weight:800;color:var(--gold);}
.rtable .rmt{font-weight:800;font-size:14px;}
.drow td{background:var(--bg3);font-size:11px;color:var(--mid);padding:5px 8px 5px 18px;}
.pills{display:flex;flex-wrap:wrap;gap:6px;}
.pill{padding:5px 11px;background:var(--bg2);border:2px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;color:var(--dark);display:flex;align-items:center;gap:5px;}
.pill b{color:var(--gold);}
.sbtns{display:flex;flex-direction:column;gap:8px;margin-top:18px;}
.sbtn{width:100%;padding:14px;border-radius:var(--rsm);font-family:-apple-system,sans-serif;font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.swa{background:#25D366;color:#fff;border:none;}
.scp{background:none;border:2px solid var(--border2);color:var(--mid);}
.sempty{text-align:center;padding:50px 20px;color:var(--muted);}
.sempty p{font-size:14px;line-height:1.6;}
.cov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.cov.on{opacity:1;pointer-events:all;}
.cbox{background:var(--bg);border-radius:20px 20px 0 0;border-top:2px solid var(--border2);padding:20px 20px;padding-bottom:max(20px,env(safe-area-inset-bottom,20px));width:100%;max-width:430px;}
.ctitle{font-size:19px;font-weight:700;color:var(--dark);margin-bottom:7px;}
.cmsg{font-size:14px;color:var(--mid);line-height:1.5;margin-bottom:18px;}
.cbtns{display:flex;gap:9px;}
.cbtns button{flex:1;padding:13px;border-radius:var(--rsm);font-family:-apple-system,sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.ccx{background:var(--bg3);border:2px solid var(--border);color:var(--mid);}
.cok{background:var(--red);border:none;color:#fff;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <!-- LOGO SVG — centered spires + text -->
    <div class="hdr-logo">
      <svg width="200" height="56" viewBox="0 0 200 56" xmlns="http://www.w3.org/2000/svg">
        <g fill="#7a6648">
          <!-- Outer pair (shortest) -->
          <polygon points="67,34 70,34 69.5,24 67.5,24"/>
          <polygon points="130,34 133,34 132.5,24 130.5,24"/>
          <!-- Second pair -->
          <polygon points="73,34 76.5,34 75.5,17 74,17"/>
          <polygon points="123.5,34 127,34 126,17 124.5,17"/>
          <!-- Third pair -->
          <polygon points="80,34 84,34 82.5,11 81.5,11"/>
          <polygon points="116,34 120,34 118.5,11 117.5,11"/>
          <!-- Fourth pair -->
          <polygon points="87,34 91,34 89.5,5 88.5,5"/>
          <polygon points="109,34 113,34 111.5,5 110.5,5"/>
          <!-- Center (tallest) -->
          <polygon points="97,34 103,34 101,1 99,1"/>
        </g>
        <line x1="20" y1="36.5" x2="180" y2="36.5" stroke="#7a6648" stroke-width="0.9"/>
        <text x="100" y="47" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10.5" font-weight="400" letter-spacing="2.2" fill="#c9a940">TERRAZZA DUOMO 21</text>
        <text x="100" y="55" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="7" font-weight="400" letter-spacing="3.5" fill="#7a6648">LOUNGE BAR</text>
      </svg>
    </div>
    <div class="hdr-clock">
      <div class="hclock-date" id="hDate">–</div>
      <div class="hclock-time" id="hTime">–:–</div>
    </div>
  </div>
  <div class="nav">
    <button class="ntab on" id="tab-map" onclick="showPage('map')">Tavoli</button>
    <button class="ntab" id="tab-report" onclick="showPage('report')">Rapporto</button>
    <button class="ntab" id="tab-chiusura" onclick="showPage('chiusura')">Chiusura</button>
  </div>
</div>

<div class="pages">
  <div class="page on" id="page-map">

    <!-- ══ SEZIONE PRINCIPALE — 8 cols ══ -->
    <div class="sec-lbl">Sezione Principale</div>
    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-bottom:5px;">
      <button class="t vip" id="tb-D1"  onclick="openSheet('D1')"><span class="tname">D1</span></button>
      <button class="t"     id="tb-10"  onclick="openSheet('10')"><span class="tname">10</span></button>
      <button class="t"     id="tb-9"   onclick="openSheet('9')"><span class="tname">9</span></button>
      <button class="t"     id="tb-8"   onclick="openSheet('8')"><span class="tname">8</span></button>
      <button class="t"     id="tb-7"   onclick="openSheet('7')"><span class="tname">7</span></button>
      <button class="t"     id="tb-6"   onclick="openSheet('6')"><span class="tname">6</span></button>
      <button class="t"     id="tb-5"   onclick="openSheet('5')"><span class="tname">5</span></button>
      <button class="t"     id="tb-4"   onclick="openSheet('4')"><span class="tname">4</span></button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-bottom:5px;">
      <button class="t vip" id="tb-D2"  onclick="openSheet('D2')"><span class="tname">D2</span></button>
      <button class="t"     id="tb-10A" onclick="openSheet('10A')"><span class="tname">10A</span></button>
      <button class="t"     id="tb-9A"  onclick="openSheet('9A')"><span class="tname">9A</span></button>
      <button class="t"     id="tb-8A"  onclick="openSheet('8A')"><span class="tname">8A</span></button>
      <button class="t"     id="tb-7A"  onclick="openSheet('7A')"><span class="tname">7A</span></button>
      <button class="t"     id="tb-6A"  onclick="openSheet('6A')"><span class="tname">6A</span></button>
      <button class="t"     id="tb-5A"  onclick="openSheet('5A')"><span class="tname">5A</span></button>
      <button class="t"     id="tb-4A"  onclick="openSheet('4A')"><span class="tname">4A</span></button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:5px;">
      <button class="t vip" id="tb-D3" onclick="openSheet('D3')"><span class="tname">D3</span></button>
    </div>

    <div class="sec-div"></div>

    <!-- ══ AREA DJ · VIP — 8 cols, 2 rows ══ -->
    <div class="sec-lbl">Area DJ · VIP</div>
    <div style="display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:auto auto;gap:5px;align-items:stretch;">
      <button class="t vip" id="tb-D4" onclick="openSheet('D4')" style="grid-column:1;grid-row:1;"><span class="tname">D4</span></button>
      <button class="t vip" id="tb-J"  onclick="openSheet('J')"  style="grid-column:2;grid-row:1/3;aspect-ratio:unset;height:100%;"><span style="font-size:22px;font-weight:900;color:var(--dark);">J</span></button>
      <button class="t"     id="tb-G7" onclick="openSheet('G7')" style="grid-column:3;grid-row:1;"><span class="tname">G7</span></button>
      <button class="t"     id="tb-G6" onclick="openSheet('G6')" style="grid-column:4;grid-row:1;"><span class="tname">G6</span></button>
      <button class="t vip" id="tb-G5" onclick="openSheet('G5')" style="grid-column:5;grid-row:1/3;aspect-ratio:unset;height:100%;"><span style="font-size:15px;font-weight:900;color:var(--dark);">G5</span></button>
      <div style="grid-column:6;grid-row:1/3;display:flex;align-items:center;justify-content:center;font-size:22px;">🎧</div>
      <button class="t vip" id="tb-G1G2" onclick="openSheet('G1G2')" style="grid-column:7;grid-row:1/3;aspect-ratio:unset;height:100%;border-width:2.5px;"><span style="font-size:13px;font-weight:900;color:var(--dark);line-height:1.4;text-align:center;">G2<br>G1</span></button>
      <button class="t"     id="tb-2"  onclick="openSheet('2')"  style="grid-column:8;grid-row:1;"><span class="tname">2</span></button>
      <button class="t vip" id="tb-D5" onclick="openSheet('D5')" style="grid-column:1;grid-row:2;"><span class="tname">D5</span></button>
      <div style="grid-column:3;grid-row:2;"></div>
      <div style="grid-column:4;grid-row:2;"></div>
      <button class="t"     id="tb-1"  onclick="openSheet('1')"  style="grid-column:8;grid-row:2;"><span class="tname">1</span></button>
    </div>

    <div class="sec-div"></div>

    <!-- ══ LOUNGE — 6 cols for top 2 rows + 6 cols for 51-56 ══ -->
    <div class="sec-lbl">Lounge</div>

    <!-- Row 1: L1S  L2S  [sp]  [sp]  E7  [sp] -->
    <!-- Row 2: L1D  L2D  [sp]  [sp]  E8  [sp] -->
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:5px;">
      <!-- Row 1 -->
      <button class="t" id="tb-L1S" onclick="openSheet('L1S')" style="grid-column:1;grid-row:1;"><span class="tname-sm">L1<br>Sin.</span></button>
      <button class="t" id="tb-L2S" onclick="openSheet('L2S')" style="grid-column:2;grid-row:1;"><span class="tname-sm">L2<br>Sin.</span></button>
      <div style="grid-column:3;grid-row:1;"></div>
      <div style="grid-column:4;grid-row:1;"></div>
      <button class="t" id="tb-E7"  onclick="openSheet('E7')"  style="grid-column:5;grid-row:1;"><span class="tname">E7</span></button>
      <div style="grid-column:6;grid-row:1;"></div>
      <!-- Row 2 -->
      <button class="t" id="tb-L1D" onclick="openSheet('L1D')" style="grid-column:1;grid-row:2;"><span class="tname-sm">L1<br>Des.</span></button>
      <button class="t" id="tb-L2D" onclick="openSheet('L2D')" style="grid-column:2;grid-row:2;"><span class="tname-sm">L2<br>Des.</span></button>
      <div style="grid-column:3;grid-row:2;"></div>
      <div style="grid-column:4;grid-row:2;"></div>
      <button class="t" id="tb-E8"  onclick="openSheet('E8')"  style="grid-column:5;grid-row:2;"><span class="tname">E8</span></button>
      <div style="grid-column:6;grid-row:2;"></div>
    </div>

    <!-- Row 3: 51 52 53 54 55 56 -->
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:5px;">
      <button class="t" id="tb-51" onclick="openSheet('51')"><span class="tname">51</span></button>
      <button class="t" id="tb-52" onclick="openSheet('52')"><span class="tname">52</span></button>
      <button class="t" id="tb-53" onclick="openSheet('53')"><span class="tname">53</span></button>
      <button class="t" id="tb-54" onclick="openSheet('54')"><span class="tname">54</span></button>
      <button class="t" id="tb-55" onclick="openSheet('55')"><span class="tname">55</span></button>
      <button class="t" id="tb-56" onclick="openSheet('56')"><span class="tname">56</span></button>
    </div>

  </div><!-- page-map -->

  <div class="page" id="page-report"><div id="repContent"></div></div>
  <div class="page" id="page-chiusura">
    <div style="padding:10px 0;">
      <div style="background:var(--dark);border-radius:10px;padding:20px 18px;margin-bottom:20px;">

        <svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        Azzera tutti i tavoli
      </button>
      <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:10px;">⚠️ L'operazione è irreversibile</p>
    </div>
  </div>
</div>

<script>
function logo(id){
  var L={
    tonica:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#003087"/><text x="20" y="17" text-anchor="middle" font-size="7" font-weight="bold" fill="white" font-family="Arial,sans-serif">ACQUA</text><text x="20" y="27" text-anchor="middle" font-size="7" font-weight="bold" fill="#FFC72C" font-family="Arial,sans-serif">TONICA</text></svg>',
    lemon:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><ellipse cx="20" cy="23" rx="15" ry="12" fill="#FFE135"/><ellipse cx="20" cy="23" rx="10" ry="8" fill="#FFF176"/><path d="M20 11 Q22 7 20 5 Q18 7 20 11Z" fill="#4CAF50"/><circle cx="20" cy="23" r="4" fill="#FFFDE7" opacity="0.7"/></svg>',
    redbull:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#CC1100"/><circle cx="20" cy="20" r="19" fill="none" stroke="#003087" stroke-width="3.5"/><text x="20" y="18" text-anchor="middle" font-size="8" font-weight="bold" fill="white" font-family="Arial,sans-serif">RED</text><text x="20" y="28" text-anchor="middle" font-size="8" font-weight="bold" fill="#FFD700" font-family="Arial,sans-serif">BULL</text></svg>',
    coca:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#F40000"/><text x="20" y="23" text-anchor="middle" font-size="8" font-weight="bold" fill="white" font-family="Georgia,serif">Coca-Cola</text></svg>',
    cocaz:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#111111"/><text x="20" y="19" text-anchor="middle" font-size="8" font-weight="bold" fill="white" font-family="Georgia,serif">Coca-Cola</text><text x="20" y="29" text-anchor="middle" font-size="8" font-weight="bold" fill="#F40000" font-family="Arial,sans-serif">ZERO</text></svg>',
    sprite:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#00A550"/><text x="20" y="25" text-anchor="middle" font-size="14" font-weight="900" fill="#FFF200" font-family="Arial Black,Arial,sans-serif">Sprite</text></svg>',
    grape:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#FF7043"/><circle cx="20" cy="20" r="12" fill="#FF8A65" opacity="0.9"/><line x1="20" y1="8" x2="20" y2="32" stroke="#BF360C" stroke-width="1.2"/><line x1="8" y1="20" x2="32" y2="20" stroke="#BF360C" stroke-width="1.2"/><line x1="11" y1="11" x2="29" y2="29" stroke="#BF360C" stroke-width="1.2"/><line x1="29" y1="11" x2="11" y2="29" stroke="#BF360C" stroke-width="1.2"/></svg>',
    acqua:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#E3F2FD"/><path d="M20 8 C14 14 10 18 10 22 C10 27.5 14.5 32 20 32 C25.5 32 30 27.5 30 22 C30 18 26 14 20 8Z" fill="#2196F3" opacity="0.75"/></svg>',
    gas:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#B3E5FC"/><path d="M20 8 C14 14 10 18 10 22 C10 27.5 14.5 32 20 32 C25.5 32 30 27.5 30 22 C30 18 26 14 20 8Z" fill="#0288D1" opacity="0.8"/><circle cx="14" cy="21" r="2.5" fill="white" opacity="0.9"/><circle cx="24" cy="17" r="2" fill="white" opacity="0.9"/><circle cx="20" cy="27" r="1.8" fill="white" opacity="0.9"/></svg>',
    aranc:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#FF8C00"/><circle cx="20" cy="20" r="12" fill="#FFA726" opacity="0.85"/><circle cx="20" cy="20" r="5" fill="#FFD54F" opacity="0.7"/></svg>',
    anan:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><ellipse cx="20" cy="25" rx="11" ry="13" fill="#FFD600"/><path d="M14 12 Q20 6 26 12 Q22 9 20 10 Q18 9 14 12Z" fill="#388E3C"/><line x1="13" y1="18" x2="27" y2="18" stroke="#F9A825" stroke-width="1.2"/><line x1="12" y1="23" x2="28" y2="23" stroke="#F9A825" stroke-width="1.2"/><line x1="13" y1="28" x2="27" y2="28" stroke="#F9A825" stroke-width="1.2"/></svg>',
    cran:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#880E4F"/><circle cx="20" cy="20" r="11" fill="#C2185B" opacity="0.85"/><circle cx="20" cy="20" r="5" fill="#F06292" opacity="0.7"/></svg>',
    mela:'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="22" r="15" fill="#7CB342"/><circle cx="20" cy="22" r="10" fill="#AED581" opacity="0.7"/><path d="M20 7 Q22 3 20 1 Q18 3 20 7Z" fill="#388E3C"/><path d="M20 7 L21 10" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/></svg>',
  };
  return L[id]||'<svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#ccc"/></svg>';
}

var SOFTS=[
  {id:'tonica',n:'Acqua Tonica'},{id:'lemon',n:'Lemon Soda'},{id:'redbull',n:'Red Bull'},
  {id:'coca',n:'Coca-Cola'},{id:'cocaz',n:'Coca Zero'},{id:'sprite',n:'Sprite'},
  {id:'grape',n:'Tonica Grape'},{id:'acqua',n:'Acqua Nat.'},{id:'gas',n:'Acqua Gass.'},
  {id:'aranc',n:'S. Arancia'},{id:'anan',n:'S. Ananas'},{id:'cran',n:'S. Cranberry'},{id:'mela',n:'S. Mela'},
];
var BRANDS={
  Vodka:['Belvedere','Belvedere Magnum','Absolut Elix','Beluga','Cîroc','Crystal Head'],
  Gin:['Malfy Originale','Malfy Arancia','Malfy Limone','Malfy Pompelmo','Hendrick\'s','Monkey 47','Mare','Nordés','Tanqueray Ten','Bombay Sapphire'],
  Rum:['Don Papa','Santa Teresa','Bumbu Original','Bumbu XO','Bumbu Cream','Havana 7y'],
  Whiskey:['J.W. Red Label','J.W. Black Label','J.W. Gold Label','J.W. Blue Label','Jack Daniel\'s','Black Barrel','Macallan 12y','Macallan 15y','Macallan 18y'],
  Cognac:['Hennessy VS','Hennessy XO'],
  Tequila:['Patrón Silver','Patrón Reposado','Patrón Añejo','Volcán Blanco','Volcán Reposado','Volcán Mi Tierra X.A.','Casamigos Blanco','Casamigos Reposado','Casamigos Mezcal','Clase Azul Plata','Clase Azul Reposado','Clase Azul Añejo','Clase Azul Durango','Fortaleza Blanco','Fortaleza Reposado','Fortaleza Añejo','Don Julio 1942'],
  Champagne:['Dom Pérignon Brut','Dom Pérignon Magnum','Dom Pérignon Rosé','Dom Pérignon Rosé Magnum','Dom Pérignon Luminous','Dom Pérignon Luminous Magnum','Dom Pérignon P2 2004','Krug','Krug Rosé','Veuve Clicquot','Veuve Clicquot Rosé','Veuve Clicquot Magnum','Veuve Clicquot Rosé Magnum','Moët & Chandon Brut Magnum','Moët & Chandon Ice','Moët & Chandon Ice Rosé','Armand de Brignac','Armand de Brignac Rosé','Cristal','Cristal Rosé','Cristal Magnum'],
  'Vino Bianco':[],'Vino Rosso':[],'Prosecco':[],'Altro':[]
};
// Brands that give 16 softs instead of 8
var MAGNUM_BRANDS={'Belvedere Magnum':1};
var SPIRITS=['Vodka','Gin','Whiskey','Rum','Tequila','Cognac','Vino Bianco','Vino Rosso','Champagne','Prosecco','Altro'];
var SUPER={Vodka:1,Gin:1,Whiskey:1,Rum:1,Tequila:1,Cognac:1,Altro:1};

// Label overrides for display
var LABELS={G1G2:'G1 + G2', L1S:'L1 Sinistra', L1D:'L1 Destra', L2S:'L2 Sinistra', L2D:'L2 Destra'};

var ALL_IDS=['D1','D2','D3','D4','D5','10','9','8','7','6','5','4','2','10A','9A','8A','7A','6A','5A','4A','1','J','G7','G6','G5','G1G2','L1S','L1D','L2S','L2D','E7','E8','51','52','53','54','55','56'];

var TD={},CT=null,CC=0,CCB=null;

function getT(id){if(!TD[id])TD[id]={clients:[mkC(1)]};return TD[id];}
function mkC(n){return{num:n,bottles:[{spirit:'',brand:'',qty:1}],softs:{},tickets:0};}function totB(c){return c.bottles.reduce(function(s,b){return s+(b.spirit?(parseInt(b.qty)||0):0);},0);}
function supB(c){return c.bottles.filter(function(b){return b.spirit&&SUPER[b.spirit];}).reduce(function(s,b){var qty=parseInt(b.qty)||0;return s+(MAGNUM_BRANDS[b.brand]?qty*2:qty);},0);}
function usedS(c){return Object.values(c.softs).reduce(function(s,v){return s+(v||0);},0);}
// For RED color: only the LAST (current) client counts
function lastClientHasD(id){
  if(!TD[id])return false;
  var clients=TD[id].clients;
  var last=clients[clients.length-1];
  return totB(last)>0||(last.tickets>0);
}
// For REPORT inclusion: any client has data
function hasD(id){return TD[id]&&TD[id].clients.some(function(c){return totB(c)>0||(c.tickets>0);});}

function tick(){
  var n=new Date();
  var days=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  var months=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  document.getElementById('hDate').textContent=days[n.getDay()]+' '+n.getDate()+' '+months[n.getMonth()];
  var h=n.getHours(),m=n.getMinutes();
  document.getElementById('hTime').textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}
setInterval(tick,1000);tick();

function getLabel(id){return LABELS[id]||id;}

function updateBtn(id){
  var el=document.getElementById('tb-'+id);if(!el)return;
  var occupied=lastClientHasD(id);
  var anyData=hasD(id);
  // multi = there are previous clients with data (table has history even if current client is empty)
  var hasPrevData=TD[id]&&TD[id].clients.length>1&&TD[id].clients.slice(0,-1).some(function(c){return totB(c)>0||(c.tickets>0);});

  // Remove old state classes
  el.classList.remove('act','multi');

  if(occupied){
    // Current client has data → full red
    el.classList.add('act');
  } else if(hasPrevData){
    // Previous clients have data but current is empty → red border only
    el.classList.add('multi');
  }
  // else: completely free → just gold border (default)

  // Update inline text colors on tall/special buttons
  var nameEls=el.querySelectorAll('.tname,.tname-sm');
  nameEls.forEach(function(ne){ne.style.color=occupied?'#fff':'';});
  // Also handle inline span elements (J, G5, G1G2 labels)
  el.querySelectorAll('span[style*="font-weight:900"]').forEach(function(s){s.style.color=occupied?'#fff':'';});

  var d=el.querySelector('.tdot'),inf=el.querySelector('.tinfo');
  if(d)d.remove();if(inf)inf.remove();
  if(anyData){
    var tot=TD[id].clients.reduce(function(s,c){return s+totB(c);},0);
    var cl=TD[id].clients.length;
    var i=document.createElement('span');i.className='tinfo';
    // tinfo color depends on state
    i.style.color=occupied?'#ffcdd2':(hasPrevData?'#c62828':'#9a7820');
    i.textContent=tot+'x'+(cl>1?'·'+cl+'c':'');el.appendChild(i);
    var dot=document.createElement('span');dot.className='tdot';
    dot.style.background=occupied?'#fff':'#c62828';
    el.appendChild(dot);
  }
}
function buildMap(){ALL_IDS.forEach(function(id){updateBtn(id);});}

function showPage(name){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.ntab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('page-'+name).classList.add('on');
  document.getElementById('tab-'+name).classList.add('on');
  if(name==='report')renderReport();
  if(name==='chiusura'){
    var cnt=Object.keys(TD).filter(function(k){return hasD(k);}).length;
    document.getElementById('chiusura-count').textContent=cnt;
  }
}

function askClearAll(){
  var cnt=Object.keys(TD).filter(function(k){return hasD(k);}).length;
  showCov('Azzera tutti i tavoli','Sei sicuro di voler cancellare tutti i dati di '+cnt+' tavolo'+(cnt===1?'':'li')+'? Questa operazione non può essere annullata.',function(){
    TD={};CC=0;
    buildMap();
    document.getElementById('chiusura-count').textContent='0';
    showCov('Fatto!','Tutti i tavoli sono stati azzerati.',function(){},true);
  });
}

function openSheet(id){
  CT=id;var t=getT(id);
  if(CC>=t.clients.length)CC=t.clients.length-1;
  document.getElementById('stitle').innerHTML='Tavolo <b>'+getLabel(id)+'</b>';
  renderSheet();
  document.getElementById('sov').classList.add('on');
  document.getElementById('sheet').classList.add('on');
}
function closeSheet(){
  document.getElementById('sov').classList.remove('on');
  document.getElementById('sheet').classList.remove('on');
  buildMap();
}

function renderSheet(){
  var t=getT(CT),c=t.clients[CC];
  var allowed=supB(c)*8,used=usedS(c);
  var tabs='';
  t.clients.forEach(function(cl,i){
    tabs+='<button class="ctab'+(i===CC?' on':'')+'" onclick="swC('+i+')">'+cl.num+'° cliente'+(t.clients.length>1&&i===CC?'<span class="ctx" onclick="event.stopPropagation();askRemC('+i+')">✕</span>':'')+'</button>';
  });
  tabs+='<button class="ctnew" onclick="addC()">+ nuovo</button>';
  var bottles='';
  c.bottles.forEach(function(b,i){
    var opts='<option value="">Bevanda</option>';
    SPIRITS.forEach(function(s){opts+='<option value="'+s+'"'+(b.spirit===s?' selected':'')+'>'+s+'</option>';});
    // Brand dropdown — if spirit has brands, show select; else text input
    var brandList=b.spirit&&BRANDS[b.spirit]&&BRANDS[b.spirit].length?BRANDS[b.spirit]:null;
    var brandField='';
    if(brandList){
      var bopts='<option value="">Marca</option>';
      brandList.forEach(function(br){bopts+='<option value="'+br+'"'+(b.brand===br?' selected':'')+'>'+br+'</option>';});
      brandField='<select onchange="updB('+i+',\'brand\',this.value)" style="flex:1">'+bopts+'</select>';
    } else {
      brandField='<input type="text" placeholder="Marca" value="'+(b.brand||'')+'" oninput="updB('+i+',\'brand\',this.value)" style="flex:1"/>';
    }
    bottles+='<div class="bcard"><div class="br1"><select style="flex:1" onchange="updBSpirit('+i+',this.value)">'+opts+'</select><button class="bdel" onclick="remB('+i+')">✕</button></div><div class="br2">'+brandField+'<div class="qctrl"><button onclick="qB('+i+',-1)">−</button><span id="bq'+i+'">'+(b.qty||1)+'</span><button onclick="qB('+i+',1)">+</button></div></div></div>';
  });
  var tickets=c.tickets||0;
  var softs='';
  SOFTS.forEach(function(s,idx){
    var val=c.softs[s.id]||0;
    softs+='<div class="scard'+(val>0?' on':'')+'" id="sc'+idx+'">'+logo(s.id)+'<span class="sn">'+s.n+'</span><div class="scnt"><button onclick="cS(\''+s.id+'\','+idx+',-1)">−</button><span id="sv'+idx+'">'+val+'</span><button onclick="cS(\''+s.id+'\','+idx+',1)">+</button></div></div>';
  });
  var over=used>allowed&&allowed>0;
  document.getElementById('sbody').innerHTML=
    '<div class="ctabs">'+tabs+'</div>'+
    '<div class="slbl">Bottiglie</div>'+bottles+
    '<button class="badd" onclick="addB()">+ aggiungi bottiglia</button>'+
    '<div class="slbl" style="margin-top:16px">Ticket</div>'+
    '<div style="display:flex;align-items:center;gap:12px;background:var(--bg2);border:2px solid var(--border);border-radius:var(--rsm);padding:11px 14px;">'+
    '<span style="flex:1;font-size:13px;font-weight:600;color:var(--mid);">🎫 Ticket (10 pz.)</span>'+
    '<div class="qctrl" style="border:none;background:var(--bg3);padding:5px 9px;"><button onclick="chgTick(-1)">−</button><span id="tv-tick">'+tickets+'</span><button onclick="chgTick(1)">+</button></div>'+
    '</div>'+
    '<div class="slbl" style="margin-top:16px">Soft Drinks Usciti</div>'+
    '<div class="sgrid">'+softs+'</div>'+
    '<div class="tbar">'+
    '<div class="titem"><div class="tval" id="tv-b">'+totB(c)+'</div><div class="tlbl">Bottiglie</div></div>'+
    '<div class="tdiv"></div>'+
    '<div class="titem"><div class="tval" id="tv-a">'+allowed+'</div><div class="tlbl">Soft Permessi</div><div id="tv-mag" style="font-size:8px;color:#c9a940;margin-top:2px;display:'+(c.bottles.some(function(b){return MAGNUM_BRANDS[b.brand]&&b.spirit;})?'block':'none')+'">★ Magnum ×16</div></div>'+
    '<div class="tdiv"></div>'+
    '<div class="titem"><div class="tval'+(over?' over':'')+'" id="tv-u">'+used+'</div><div class="tlbl">Soft Usciti</div></div>'+
    '</div>';
  document.getElementById('sfoot').innerHTML=
    '<button class="bconf" onclick="closeSheet()">Conferma Tavolo</button>'+
    '<button class="bdanger" onclick="askClear()">Pulisci</button>';
}

function swC(i){CC=i;renderSheet();}
function addC(){var t=getT(CT),n=Math.max.apply(null,t.clients.map(function(c){return c.num;}))+1;t.clients.push(mkC(n));CC=t.clients.length-1;renderSheet();buildMap();}
function askRemC(i){var t=getT(CT);showCov('Rimuovere cliente','Rimuovere il '+t.clients[i].num+'° cliente?',function(){t.clients.splice(i,1);if(CC>=t.clients.length)CC=t.clients.length-1;renderSheet();});}
function updBSpirit(i,v){var c=getT(CT).clients[CC];c.bottles[i].spirit=v;c.bottles[i].brand='';refTot();renderSheet();}
function chgTick(d){var c=getT(CT).clients[CC];c.tickets=Math.max(0,(c.tickets||0)+d);var el=document.getElementById('tv-tick');if(el)el.textContent=c.tickets;updateBtn(CT);}
function updB(i,f,v){var c=getT(CT).clients[CC];c.bottles[i][f]=f==='qty'?Math.max(1,parseInt(v)||1):v;refTot();}
function qB(i,d){var c=getT(CT).clients[CC];c.bottles[i].qty=Math.max(1,(parseInt(c.bottles[i].qty)||1)+d);var el=document.getElementById('bq'+i);if(el)el.textContent=c.bottles[i].qty;refTot();}
function addB(){getT(CT).clients[CC].bottles.push({spirit:'',brand:'',qty:1});renderSheet();}
function remB(i){var c=getT(CT).clients[CC];c.bottles.splice(i,1);if(!c.bottles.length)c.bottles.push({spirit:'',brand:'',qty:1});renderSheet();}
function cS(id,idx,d){var c=getT(CT).clients[CC];if(!c.softs)c.softs={};c.softs[id]=Math.max(0,(c.softs[id]||0)+d);var ve=document.getElementById('sv'+idx),ie=document.getElementById('sc'+idx);if(ve)ve.textContent=c.softs[id];if(ie){c.softs[id]>0?ie.classList.add('on'):ie.classList.remove('on');}refTot();}
function refTot(){
  var c=getT(CT).clients[CC],tb=totB(c),al=supB(c)*8,us=usedS(c),ov=us>al&&al>0;
  var hasMag=c.bottles.some(function(b){return MAGNUM_BRANDS[b.brand]&&b.spirit;});
  var b=document.getElementById('tv-b'),a=document.getElementById('tv-a'),u=document.getElementById('tv-u');
  var mag=document.getElementById('tv-mag');
  if(b)b.textContent=tb;
  if(a){a.textContent=al;if(mag)mag.style.display=hasMag?'block':'none';}
  if(u){u.textContent=us;ov?u.classList.add('over'):u.classList.remove('over');}
  // live update the map button color
  updateBtn(CT);
}
function askClear(){showCov('Pulire tavolo','Cancellare tutti i clienti e le bottiglie di questo tavolo?',function(){delete TD[CT];CC=0;closeSheet();});}

function renderReport(){
  var active=Object.keys(TD).filter(function(k){return hasD(k);});
  var el=document.getElementById('repContent');
  if(!active.length){el.innerHTML='<div class="sempty"><p style="font-size:40px;margin-bottom:10px;opacity:.4">🍾</p><p>Nessuna bottiglia registrata.<br>Registra le bottiglie nei Tavoli.</p></div>';return;}
  var now=new Date();
  var days=['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
  var months=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  var ds=days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();
  var h=now.getHours(),m=now.getMinutes(),ts=(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
  var totalG=0,totalS=0,spC={},sfC={};
  active.forEach(function(id){TD[id].clients.forEach(function(c){c.bottles.forEach(function(b){if(!b.spirit)return;var q=parseInt(b.qty)||0;totalG+=q;spC[b.spirit]=(spC[b.spirit]||0)+q;});Object.keys(c.softs).forEach(function(sid){var v=c.softs[sid];totalS+=v;var sd=SOFTS.find(function(s){return s.id===sid;});if(sd&&v>0)sfC[sd.n]=(sfC[sd.n]||0)+v;});});});
  var rows='';
  active.forEach(function(id){var t=TD[id],tot=t.clients.reduce(function(s,c){return s+totB(c);},0),lbl=getLabel(id);rows+='<tr><td class="rmt">Tavolo '+lbl+'</td><td>'+t.clients.length+' cl.</td><td class="rnum">'+(tot>0?tot:'—')+'</td></tr>';t.clients.forEach(function(c){var bots=c.bottles.filter(function(b){return b.spirit;});if(!bots.length&&!(c.tickets>0))return;var bs=bots.map(function(b){return b.qty+'x '+b.spirit+(b.brand?' ('+b.brand+')':'');}).join(', ');var sf=Object.keys(c.softs).filter(function(sid){return c.softs[sid]>0;}).map(function(sid){var d=SOFTS.find(function(s){return s.id===sid;});return c.softs[sid]+'x '+(d?d.n:sid);}).join(', ');var tk=c.tickets>0?' 🎫 '+c.tickets+' ticket':'';rows+='<tr class="drow"><td colspan="3">'+c.num+'° cliente: '+(bs||'—')+(sf?' · <em>'+sf+'</em>':'')+tk+'</td></tr>';});});
  function pills(obj){return Object.keys(obj).sort(function(a,b){return obj[b]-obj[a];}).map(function(k){return'<span class="pill">'+k+' <b>'+obj[k]+'x</b></span>';}).join('');}
  el.innerHTML='<div class="rtop"><div class="rbrand">Terrazza <b>21</b></div><div class="rsub">Rapporto di Turno</div><div class="rdate">'+ds+' · '+ts+'</div></div><div class="kpis"><div class="kpi"><div class="kval">'+totalG+'</div><div class="klbl">Bottiglie</div></div><div class="kpi"><div class="kval">'+active.length+'</div><div class="klbl">Tavoli</div></div><div class="kpi"><div class="kval">'+totalS+'</div><div class="klbl">Soft</div></div></div><div class="rsec"><div class="rslbl">Per tavolo</div><table class="rtable"><thead><tr><th>Tavolo</th><th>Clienti</th><th style="text-align:right">Bottiglie</th></tr></thead><tbody>'+rows+'</tbody></table></div><div class="rsec"><div class="rslbl">Spirits venduti</div><div class="pills">'+(pills(spC)||'—')+'</div></div><div class="rsec"><div class="rslbl">Soft drinks usciti</div><div class="pills">'+(pills(sfC)||'—')+'</div></div><div class="sbtns"><button class="sbtn swa" onclick="shareWA()"><svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>Invia su WhatsApp</button><button class="sbtn scp" onclick="copyRep()">📋 Copia testo</button></div>';
}

function buildTxt(){
  var active=Object.keys(TD).filter(function(k){return hasD(k);});if(!active.length)return'';
  var now=new Date(),days=['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'],months=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  var ds=days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()];
  var h=now.getHours(),m=now.getMinutes(),ts=(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
  var totalG=0,spC={},sfC={};
  active.forEach(function(id){TD[id].clients.forEach(function(c){c.bottles.forEach(function(b){if(!b.spirit)return;var q=parseInt(b.qty)||0;totalG+=q;spC[b.spirit]=(spC[b.spirit]||0)+q;});Object.keys(c.softs).forEach(function(sid){var d=SOFTS.find(function(s){return s.id===sid;});if(d&&c.softs[sid]>0)sfC[d.n]=(sfC[d.n]||0)+c.softs[sid];});});});
  var txt='🍾 *TERRAZZA DUOMO 21*\n📋 Rapporto di Turno\n📅 '+ds+' · '+ts+'\n\n*RIEPILOGO*\n• Bottiglie totali: *'+totalG+'*\n• Tavoli attivi: *'+active.length+'*\n\n*DETTAGLIO PER TAVOLO*\n';
  active.forEach(function(id){var t=TD[id],tot=t.clients.reduce(function(s,c){return s+totB(c);},0),lbl=getLabel(id);txt+='\n🪑 *Tavolo '+lbl+'* — '+tot+' bottigli'+(tot===1?'a':'e')+'\n';t.clients.forEach(function(c){var bots=c.bottles.filter(function(b){return b.spirit;});if(!bots.length&&!(c.tickets>0))return;if(bots.length)txt+='  '+c.num+'° cliente: '+bots.map(function(b){return b.qty+'x '+b.spirit+(b.brand?' ('+b.brand+')':'');}).join(', ')+'\n';var sf=Object.keys(c.softs).filter(function(sid){return c.softs[sid]>0;}).map(function(sid){var d=SOFTS.find(function(s){return s.id===sid;});return c.softs[sid]+'x '+(d?d.n:sid);});if(sf.length)txt+='    Soft: '+sf.join(', ')+'\n';if(c.tickets>0)txt+='    🎫 '+c.tickets+' ticket\n';});});
  txt+='\n*SPIRITS*\n';Object.keys(spC).sort(function(a,b){return spC[b]-spC[a];}).forEach(function(s){txt+='• '+s+': '+spC[s]+'x\n';});
  if(Object.keys(sfC).length){txt+='\n*SOFT DRINKS*\n';Object.keys(sfC).sort(function(a,b){return sfC[b]-sfC[a];}).forEach(function(s){txt+='• '+s+': '+sfC[s]+'x\n';});}
  return txt;
}
function shareWA(){var t=buildTxt();if(!t)return;window.open('https://wa.me/?text='+encodeURIComponent(t),'_blank');}
function copyRep(){var t=buildTxt();if(!t)return;if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){showCov('Copiato!','Rapporto copiato negli appunti.',function(){},true);});}}
function showCov(title,msg,cb,infoOnly){
  document.getElementById('ctitle').textContent=title;
  document.getElementById('cmsg').textContent=msg;
  CCB=cb;
  var cancelBtn=document.querySelector('.ccx');
  if(cancelBtn)cancelBtn.style.display=infoOnly?'none':'';
  document.getElementById('cok').textContent=infoOnly?'OK':'Conferma';
  document.getElementById('cov').classList.add('on');
}
function closeCov(){document.getElementById('cov').classList.remove('on');CCB=null;}
document.getElementById('cok').onclick=function(){if(CCB)CCB();closeCov();};

window.addEventListener('DOMContentLoaded',function(){buildMap();});
</script>
