<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Terrazza 21</title>
<style>
:root {
  --bg: #f4f1ec;
  --bg2: #ffffff;
  --bg3: #e8e4dc;
  --gold: #9a7820;
  --gold2: #c9a940;
  --gold-bg: #fdf6e3;
  --dark: #1a1510;
  --mid: #5c5244;
  --muted: #8c7d6a;
  --border: #cec8be;
  --border2: #b0a898;
  --red: #c0392b;
  --r: 10px;
  --rsm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body {
  font-family: -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  color: var(--dark);
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
}

/* HEADER */
.hdr {
  flex-shrink: 0;
  background: var(--dark);
  padding-top: max(env(safe-area-inset-top, 14px), 14px);
}
.hdr-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px 10px;
}
.brand-sup { font-size: 9px; font-weight: 700; letter-spacing: .22em; color: var(--gold2); text-transform: uppercase; }
.brand-name { font-size: 24px; font-weight: 300; color: #fff; font-style: italic; letter-spacing: .02em; }
.brand-name b { font-weight: 700; font-style: normal; color: var(--gold2); }
.hdr-clock { text-align: right; }
.hclock-date { font-size: 10px; color: #6a5e4c; letter-spacing: .06em; }
.hclock-time { font-size: 18px; font-weight: 700; color: #e8dfc8; }
.nav {
  display: flex;
  border-top: 1px solid rgba(255,255,255,.08);
}
.ntab {
  flex: 1; padding: 11px 0 9px;
  font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: #5a5040; background: none; border: none; cursor: pointer;
  position: relative; transition: color .2s;
}
.ntab.on { color: var(--gold2); }
.ntab.on::after {
  content: ''; position: absolute; bottom: 0; left: 15%; right: 15%;
  height: 2px; background: var(--gold2); border-radius: 2px;
}

/* PAGES */
.pages { flex: 1; overflow: hidden; position: relative; }
.page {
  position: absolute; inset: 0;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px 14px 100px;
  opacity: 0; pointer-events: none; transition: opacity .18s;
}
.page.on { opacity: 1; pointer-events: all; }

/* MAP */
.msec { margin-bottom: 18px; }
.mlbl {
  font-size: 9px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 9px; padding-left: 2px;
}
.mrow {
  display: flex; gap: 7px; align-items: center;
  overflow-x: auto; padding-bottom: 3px;
  -webkit-overflow-scrolling: touch;
}
.mrow::-webkit-scrollbar { display: none; }

.tbtn {
  flex-shrink: 0;
  width: 54px; height: 54px;
  border-radius: var(--rsm);
  border: 2px solid var(--border);
  background: var(--bg2);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  cursor: pointer;
  position: relative;
  transition: all .12s;
  -webkit-tap-highlight-color: transparent;
}
.tbtn:active { transform: scale(.92); background: var(--bg3); }
.tbtn.vip { width: 62px; height: 62px; border-color: var(--gold2); border-width: 2px; }
.tbtn.act { background: var(--gold-bg); border-color: var(--gold); }
.tbtn.multi { border-color: var(--gold); border-width: 2.5px; }
.tname { font-size: 13px; font-weight: 800; color: var(--dark); line-height: 1; }
.tbtn.vip .tname { font-size: 14px; }
.tinfo { font-size: 9px; font-weight: 700; color: var(--gold); }
.tdot { position: absolute; top: 5px; right: 5px; width: 7px; height: 7px; border-radius: 50%; background: var(--gold2); }
.tsp { width: 54px; height: 54px; flex-shrink: 0; }
.tdj { width: 54px; height: 54px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; }

/* BOTTOM SHEET */
.sov {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 50; opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.sov.on { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  max-width: 430px; margin: 0 auto;
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  border-top: 2px solid var(--border2);
  z-index: 51;
  max-height: 92vh;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  padding-bottom: max(env(safe-area-inset-bottom, 0px), 0px);
}
.sheet.on { transform: translateY(0); }
.shandle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
.shdr {
  padding: 12px 18px 10px;
  border-bottom: 1.5px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.stitle { font-size: 22px; font-weight: 300; font-style: italic; color: var(--dark); letter-spacing: .02em; }
.stitle b { font-weight: 800; font-style: normal; color: var(--gold); }
.sclose {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; font-weight: 700; color: var(--mid);
}
.sbody { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 18px; }
.sfoot {
  padding: 10px 18px 8px;
  border-top: 1.5px solid var(--border);
  flex-shrink: 0; display: flex; gap: 10px;
}

/* SECTION LABEL */
.slbl {
  font-size: 10px; font-weight: 800; letter-spacing: .16em;
  text-transform: uppercase; color: var(--gold);
  margin: 18px 0 9px;
}
.slbl:first-child { margin-top: 0; }

/* CLIENT TABS */
.ctabs { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.ctab {
  padding: 7px 14px; border-radius: 20px;
  border: 2px solid var(--border); background: var(--bg2);
  font-size: 12px; font-weight: 700; color: var(--mid);
  cursor: pointer; display: flex; align-items: center; gap: 5px;
  transition: all .15s;
}
.ctab.on { background: var(--dark); color: #fff; border-color: var(--dark); }
.ctx { opacity: .5; font-size: 11px; }
.ctnew {
  padding: 7px 12px; border-radius: 20px;
  border: 2px dashed var(--border2); background: none;
  font-size: 11px; font-weight: 700; color: var(--gold); cursor: pointer;
}

/* BOTTLE CARD */
.bcard {
  background: var(--bg2); border: 2px solid var(--border);
  border-radius: var(--rsm); padding: 12px; margin-bottom: 9px;
}
.br1 { display: flex; gap: 8px; align-items: center; margin-bottom: 9px; }
.br2 { display: flex; gap: 8px; align-items: center; }
select, input[type=text] {
  background: var(--bg3); border: 2px solid var(--border2);
  border-radius: 7px; color: var(--dark);
  font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
  font-size: 15px; font-weight: 500;
  padding: 10px 10px; width: 100%;
  -webkit-appearance: none; outline: none;
}
select:focus, input:focus { border-color: var(--gold2); }
.qctrl {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg3); border: 2px solid var(--border2);
  border-radius: 7px; padding: 6px 10px; flex-shrink: 0;
}
.qctrl button {
  background: none; border: none; color: var(--gold);
  font-size: 22px; cursor: pointer; width: 22px;
  text-align: center; font-weight: 900; line-height: 1;
}
.qctrl span { font-size: 17px; font-weight: 800; color: var(--dark); min-width: 22px; text-align: center; }
.bdel { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; margin-left: auto; }
.badd {
  width: 100%; padding: 13px;
  background: none; border: 2px dashed var(--border2);
  border-radius: var(--rsm); color: var(--gold);
  font-family: -apple-system, sans-serif;
  font-size: 12px; font-weight: 800; letter-spacing: .1em;
  text-transform: uppercase; cursor: pointer; margin-bottom: 2px;
}

/* SOFTS GRID */
.sgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
.scard {
  background: var(--bg2); border: 2px solid var(--border);
  border-radius: var(--rsm);
  padding: 10px 4px 9px;
  display: flex; flex-direction: column;
  align-items: center; gap: 5px;
  cursor: pointer; transition: all .12s;
  user-select: none;
}
.scard:active { transform: scale(.92); }
.scard.on { border-color: var(--gold2); background: var(--gold-bg); }
.scard svg { display: block; }
.sn {
  font-size: 9px; font-weight: 700; color: var(--mid);
  text-align: center; line-height: 1.2;
}
.scnt { display: flex; align-items: center; gap: 6px; }
.scnt button {
  background: var(--bg3); border: 2px solid var(--border2);
  border-radius: 5px; width: 26px; height: 26px;
  color: var(--dark); font-size: 18px; font-weight: 900;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.scnt button:active { background: var(--border2); }
.scnt span { font-size: 17px; font-weight: 800; color: var(--dark); min-width: 18px; text-align: center; }

/* TOTALS BAR */
.tbar {
  display: flex; margin-top: 18px;
  background: var(--dark); border-radius: var(--rsm); overflow: hidden;
}
.titem { flex: 1; padding: 13px 6px; text-align: center; }
.tdiv { width: 1px; background: rgba(255,255,255,.1); }
.tval { font-size: 28px; font-weight: 800; color: var(--gold2); line-height: 1; }
.tval.over { color: #ff6b6b; }
.tlbl { font-size: 8px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #7a6a54; margin-top: 3px; }

/* BUTTONS */
.bconf {
  flex: 1; padding: 15px;
  background: var(--dark); color: #fff; border: none;
  border-radius: var(--rsm);
  font-family: -apple-system, sans-serif;
  font-size: 12px; font-weight: 800; letter-spacing: .1em;
  text-transform: uppercase; cursor: pointer;
}
.bconf:active { opacity: .85; }
.bdanger {
  padding: 15px 16px; background: none; color: var(--red);
  border: 2px solid rgba(192,57,43,.3);
  border-radius: var(--rsm); font-size: 12px; font-weight: 700; cursor: pointer;
}

/* REPORT */
.rtop {
  background: var(--dark); border-radius: var(--r);
  padding: 20px 18px; margin-bottom: 16px;
}
.rbrand { font-size: 26px; font-weight: 300; font-style: italic; color: #fff; }
.rbrand b { font-weight: 800; font-style: normal; color: var(--gold2); }
.rsub { font-size: 9px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: #6a5c46; margin-top: 3px; }
.rdate { font-size: 12px; color: #a89070; margin-top: 8px; }
.kpis { display: grid; grid-template-columns: repeat(3,1fr); gap: 9px; margin-bottom: 16px; }
.kpi { background: var(--bg2); border: 2px solid var(--border); border-radius: var(--rsm); padding: 14px 8px; text-align: center; }
.kval { font-size: 32px; font-weight: 800; color: var(--gold); line-height: 1; }
.klbl { font-size: 8px; font-weight: 700; letter-spacing: .13em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
.rsec { margin-bottom: 18px; }
.rslbl { font-size: 9px; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: 9px; }
.rtable { width: 100%; border-collapse: collapse; }
.rtable th { font-size: 9px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding: 7px 10px; border-bottom: 2px solid var(--border); text-align: left; }
.rtable td { font-size: 13px; color: var(--dark); padding: 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
.rtable td.rnum { text-align: right; font-weight: 800; color: var(--gold); }
.rtable .rmt { font-weight: 800; font-size: 15px; }
.drow td { background: var(--bg3); font-size: 11px; color: var(--mid); padding: 6px 10px 6px 20px; }
.pills { display: flex; flex-wrap: wrap; gap: 7px; }
.pill { padding: 6px 12px; background: var(--bg2); border: 2px solid var(--border); border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--dark); display: flex; align-items: center; gap: 6px; }
.pill b { color: var(--gold); }
.sbtns { display: flex; flex-direction: column; gap: 9px; margin-top: 20px; }
.sbtn {
  width: 100%; padding: 15px; border-radius: var(--rsm);
  font-family: -apple-system, sans-serif; font-size: 12px; font-weight: 800;
  letter-spacing: .09em; text-transform: uppercase; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 9px;
}
.swa { background: #25D366; color: #fff; border: none; }
.scp { background: none; border: 2px solid var(--border2); color: var(--mid); }
.sempty { text-align: center; padding: 60px 20px; color: var(--muted); }
.sempty p { font-size: 14px; line-height: 1.6; }

/* CONFIRM */
.cov { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
.cov.on { opacity: 1; pointer-events: all; }
.cbox {
  background: var(--bg); border-radius: 20px 20px 0 0;
  border-top: 2px solid var(--border2);
  padding: 22px 22px;
  padding-bottom: max(22px, env(safe-area-inset-bottom, 22px));
  width: 100%; max-width: 430px;
}
.ctitle { font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
.cmsg { font-size: 14px; color: var(--mid); line-height: 1.5; margin-bottom: 20px; }
.cbtns { display: flex; gap: 10px; }
.cbtns button { flex: 1; padding: 14px; border-radius: var(--rsm); font-family: -apple-system, sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
.ccx { background: var(--bg3); border: 2px solid var(--border); color: var(--mid); }
.cok { background: var(--red); border: none; color: #fff; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div>
      <div class="brand-sup">Milano · Duomo</div>
      <div class="brand-name">Terrazza <b>21</b></div>
    </div>
    <div class="hdr-clock">
      <div class="hclock-date" id="hDate">–</div>
      <div class="hclock-time" id="hTime">–:–</div>
    </div>
  </div>
  <div class="nav">
    <button class="ntab on" id="tab-map" onclick="showPage('map')">Mappa</button>
    <button class="ntab" id="tab-report" onclick="showPage('report')">Rapporto</button>
  </div>
</div>

<div class="pages">
  <div class="page on" id="page-map">
    <div class="msec">
      <div class="mlbl">Sezione Principale</div>
      <div class="mrow" id="row1"></div>
      <div class="mrow" id="row2"></div>
    </div>
    <div class="msec">
      <div class="mlbl">Area Centrale</div>
      <div class="mrow" id="row3"></div>
    </div>
    <div class="msec">
      <div class="mlbl">Area DJ · VIP</div>
      <div class="mrow" id="row4"></div>
      <div class="mrow" id="row5"></div>
    </div>
  </div>
  <div class="page" id="page-report">
    <div id="repContent"></div>
  </div>
</div>

<!-- SHEET -->
<div class="sov" id="sov" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="shandle"></div>
  <div class="shdr">
    <div class="stitle" id="stitle">Tavolo</div>
    <div class="sclose" onclick="closeSheet()">✕</div>
  </div>
  <div class="sbody" id="sbody"></div>
  <div class="sfoot" id="sfoot"></div>
</div>

<!-- CONFIRM -->
<div class="cov" id="cov">
  <div class="cbox">
    <div class="ctitle" id="ctitle"></div>
    <div class="cmsg" id="cmsg"></div>
    <div class="cbtns">
      <button class="ccx" onclick="closeCov()">Annulla</button>
      <button class="cok" id="cok">Conferma</button>
    </div>
  </div>
</div>

    anan:   '<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><ellipse cx="20" cy="25" rx="11" ry="13" fill="#FFD600"/><path d="M14 12 Q20 6 26 12 Q22 9 20 10 Q18 9 14 12Z" fill="#388E3C"/><line x1="13" y1="18" x2="27" y2="18" stroke="#F9A825" stroke-width="1.2"/><line x1="12" y1="23" x2="28" y2="23" stroke="#F9A825" stroke-width="1.2"/><line x1="13" y1="28" x2="27" y2="28" stroke="#F9A825" stroke-width="1.2"/></svg>',
    cran:   '<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#880E4F"/><circle cx="20" cy="20" r="11" fill="#C2185B" opacity="0.85"/><circle cx="20" cy="20" r="5" fill="#F06292" opacity="0.7"/></svg>',
    mela:   '<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="22" r="15" fill="#7CB342"/><circle cx="20" cy="22" r="10" fill="#AED581" opacity="0.7"/><path d="M20 7 Q22 3 20 1 Q18 3 20 7Z" fill="#388E3C"/><path d="M20 7 L21 10" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/></svg>',
  };
  return L[id] || '<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="19" fill="#ccc"/></svg>';
}

// ── DATA ─────────────────────────────────────────────────────
const SOFTS = [
  {id:'tonica', n:'Acqua Tonica'},
  {id:'lemon',  n:'Lemon Soda'},
  {id:'redbull',n:'Red Bull'},
  {id:'coca',   n:'Coca-Cola'},
  {id:'cocaz',  n:'Coca Zero'},
  {id:'sprite', n:'Sprite'},
  {id:'grape',  n:'Tonica Grape'},
  {id:'acqua',  n:'Acqua Nat.'},
  {id:'gas',    n:'Acqua Gass.'},
  {id:'aranc',  n:'S. Arancia'},
  {id:'anan',   n:'S. Ananas'},
  {id:'cran',   n:'S. Cranberry'},
  {id:'mela',   n:'S. Mela'},
];

const SPIRITS = ['Vodka','Gin','Whiskey','Rum','Tequila','Cognac','Vino Bianco','Vino Rosso','Champagne','Prosecco','Altro'];
const SUPER = new Set(['Vodka','Gin','Whiskey','Rum','Tequila','Cognac','Altro']);

const LAYOUT = {
  row1: ['D1','10','9','8','7','6','5','4'],
  row2: ['D2','10A','9A','8A','7A','6A','5A','4A'],
  row3: ['D3','_','_','8B','_','_','_','_'],
  row4: ['D4','J','G7','G6','G5','_dj','G2','G1','2','1'],
  row5: ['D5']
};
const VIPS = new Set(['D1','D2','D3','D4','D5','J','G5','G2','G1']);

// ── STATE ────────────────────────────────────────────────────
var TD = {};    // tableData
var CT = null;  // current table
var CC = 0;     // current client index
var CCB = null; // confirm callback

function getT(id) {
  if (!TD[id]) TD[id] = { clients: [mkC(1)] };
  return TD[id];
}
function mkC(n) { return { num: n, bottles: [{spirit:'',brand:'',qty:1}], softs:{} }; }
function totB(c) { return c.bottles.reduce(function(s,b){ return s+(parseInt(b.qty)||0); }, 0); }
function supB(c) { return c.bottles.filter(function(b){ return SUPER.has(b.spirit); }).reduce(function(s,b){ return s+(parseInt(b.qty)||0); }, 0); }
function usedS(c) { return Object.values(c.softs).reduce(function(s,v){ return s+(v||0); }, 0); }
function hasD(id) { return TD[id] && TD[id].clients.some(function(c){ return totB(c)>0; }); }

// ── CLOCK ────────────────────────────────────────────────────
function tick() {
  var n = new Date();
  var days = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  var months = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  document.getElementById('hDate').textContent = days[n.getDay()] + ' ' + n.getDate() + ' ' + months[n.getMonth()];
  var h = n.getHours(); var m = n.getMinutes();
  document.getElementById('hTime').textContent = (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}
setInterval(tick, 1000);
tick();

// ── MAP ──────────────────────────────────────────────────────
function buildMap() {
  Object.keys(LAYOUT).forEach(function(rid) {
    var tables = LAYOUT[rid];
    var el = document.getElementById(rid);
    if (!el) return;
    el.innerHTML = '';
    tables.forEach(function(id) {
      if (id === '_') {
        var sp = document.createElement('div');
        sp.className = 'tsp';
        el.appendChild(sp);
        return;
      }
      if (id === '_dj') {
        var dj = document.createElement('div');
        dj.className = 'tdj';
        dj.textContent = '🎧';
        el.appendChild(dj);
        return;
      }
      var btn = document.createElement('button');
      var active = hasD(id);
      var multi = TD[id] && TD[id].clients.length > 1;
      var cls = 'tbtn';
      if (VIPS.has(id)) cls += ' vip';
      if (active) cls += ' act';
      if (multi) cls += ' multi';
      btn.className = cls;
      var total = TD[id] ? TD[id].clients.reduce(function(s,c){ return s+totB(c); }, 0) : 0;
      var cl = TD[id] ? TD[id].clients.length : 1;
      var inner = '<span class="tname">' + id + '</span>';
      if (total > 0) {
        inner += '<span class="tinfo">' + total + 'x' + (cl > 1 ? '·'+cl+'c' : '') + '</span>';
        inner += '<span class="tdot"></span>';
      }
      btn.innerHTML = inner;
      (function(tid){ btn.onclick = function(){ openSheet(tid); }; })(id);
      el.appendChild(btn);
    });
  });
}

// ── PAGES ────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.ntab').forEach(function(t){ t.classList.remove('on'); });
  document.getElementById('page-'+name).classList.add('on');
  document.getElementById('tab-'+name).classList.add('on');
  if (name === 'report') renderReport();
}

// ── SHEET ────────────────────────────────────────────────────
function openSheet(id) {
  CT = id;
  var t = getT(id);
  if (CC >= t.clients.length) CC = t.clients.length - 1;
  document.getElementById('stitle').innerHTML = 'Tavolo <b>' + id + '</b>';
  renderSheet();
  document.getElementById('sov').classList.add('on');
  document.getElementById('sheet').classList.add('on');
}

function closeSheet() {
  document.getElementById('sov').classList.remove('on');
  document.getElementById('sheet').classList.remove('on');
  buildMap();
}

function renderSheet() {
  var t = getT(CT);
  var c = t.clients[CC];
  var allowed = supB(c) * 8;
  var used = usedS(c);

  // Tabs
  var tabs = '';
  t.clients.forEach(function(cl, i) {
    tabs += '<button class="ctab' + (i===CC?' on':'') + '" onclick="swC('+i+')">' +
      cl.num + '° cliente' +
      (t.clients.length > 1 && i === CC ? '<span class="ctx" onclick="event.stopPropagation();askRemC('+i+')">✕</span>' : '') +
      '</button>';
  });
  tabs += '<button class="ctnew" onclick="addC()">+ nuovo</button>';

  // Bottles
  var bottles = '';
  c.bottles.forEach(function(b, i) {
    var opts = '<option value="">Bevanda</option>';
    SPIRITS.forEach(function(s) {
      opts += '<option value="'+s+'"'+(b.spirit===s?' selected':'')+'>'+s+'</option>';
    });
    bottles += '<div class="bcard">' +
      '<div class="br1"><select style="flex:1" onchange="updB('+i+',\'spirit\',this.value)">'+opts+'</select>' +
      '<button class="bdel" onclick="remB('+i+')">✕</button></div>' +
      '<div class="br2"><input type="text" placeholder="Marca" value="'+(b.brand||'')+'" oninput="updB('+i+',\'brand\',this.value)" style="flex:1"/>' +
      '<div class="qctrl"><button onclick="qB('+i+',-1)">−</button><span id="bq'+i+'">'+(b.qty||1)+'</span><button onclick="qB('+i+',1)">+</button></div>' +
      '</div></div>';
  });

  // Softs
  var softs = '';
  SOFTS.forEach(function(s, idx) {
    var val = c.softs[s.id] || 0;
    softs += '<div class="scard'+(val>0?' on':'')+'" id="sc'+idx+'">' +
      logo(s.id) +
      '<span class="sn">'+s.n+'</span>' +
      '<div class="scnt">' +
      '<button onclick="cS(\''+s.id+'\','+idx+',-1)">−</button>' +
      '<span id="sv'+idx+'">'+val+'</span>' +
      '<button onclick="cS(\''+s.id+'\','+idx+',1)">+</button>' +
      '</div></div>';
  });

  var over = used > allowed && allowed > 0;
  document.getElementById('sbody').innerHTML =
    '<div class="ctabs">' + tabs + '</div>' +
    '<div class="slbl">Bottiglie</div>' + bottles +
    '<button class="badd" onclick="addB()">+ aggiungi bottiglia</button>' +
    '<div class="slbl" style="margin-top:18px">Soft Drinks Usciti</div>' +
    '<div class="sgrid">' + softs + '</div>' +
    '<div class="tbar">' +
    '<div class="titem"><div class="tval" id="tv-b">'+totB(c)+'</div><div class="tlbl">Bottiglie</div></div>' +
    '<div class="tdiv"></div>' +
    '<div class="titem"><div class="tval" id="tv-a">'+allowed+'</div><div class="tlbl">Soft Permessi</div></div>' +
    '<div class="tdiv"></div>' +
    '<div class="titem"><div class="tval'+(over?' over':'')+'" id="tv-u">'+used+'</div><div class="tlbl">Soft Usciti</div></div>' +
    '</div>';

  document.getElementById('sfoot').innerHTML =
    '<button class="bconf" onclick="closeSheet()">Conferma Tavolo</button>' +
    '<button class="bdanger" onclick="askClear()">Pulisci</button>';
}

function swC(i) { CC = i; renderSheet(); }

function addC() {
  var t = getT(CT);
  var n = Math.max.apply(null, t.clients.map(function(c){ return c.num; })) + 1;
  t.clients.push(mkC(n));
  CC = t.clients.length - 1;
  renderSheet();
}

function askRemC(i) {
  var t = getT(CT);
  showCov('Rimuovere cliente', 'Rimuovere il '+t.clients[i].num+'° cliente?', function() {
    t.clients.splice(i, 1);
    if (CC >= t.clients.length) CC = t.clients.length - 1;
    renderSheet();
  });
}

function updB(i, f, v) {
  var c = getT(CT).clients[CC];
  c.bottles[i][f] = f === 'qty' ? Math.max(1, parseInt(v)||1) : v;
  refTot();
}

function qB(i, d) {
  var c = getT(CT).clients[CC];
  c.bottles[i].qty = Math.max(1, (parseInt(c.bottles[i].qty)||1) + d);
  var el = document.getElementById('bq'+i);
  if (el) el.textContent = c.bottles[i].qty;
  refTot();
}

function addB() {
  getT(CT).clients[CC].bottles.push({spirit:'', brand:'', qty:1});
  renderSheet();
}

function remB(i) {
  var c = getT(CT).clients[CC];
  c.bottles.splice(i, 1);
  if (!c.bottles.length) c.bottles.push({spirit:'', brand:'', qty:1});
  renderSheet();
}

function cS(id, idx, d) {
  var c = getT(CT).clients[CC];
  if (!c.softs) c.softs = {};
  c.softs[id] = Math.max(0, (c.softs[id]||0) + d);
  var ve = document.getElementById('sv'+idx);
  var ie = document.getElementById('sc'+idx);
  if (ve) ve.textContent = c.softs[id];
  if (ie) { c.softs[id] > 0 ? ie.classList.add('on') : ie.classList.remove('on'); }
  refTot();
}

function refTot() {
  var c = getT(CT).clients[CC];
  var tb = totB(c), al = supB(c)*8, us = usedS(c), ov = us > al && al > 0;
  var b = document.getElementById('tv-b');
  var a = document.getElementById('tv-a');
  var u = document.getElementById('tv-u');
  if (b) b.textContent = tb;
  if (a) a.textContent = al;
  if (u) { u.textContent = us; ov ? u.classList.add('over') : u.classList.remove('over'); }
}

function askClear() {
  showCov('Pulire tavolo', 'Cancellare tutti i clienti e le bottiglie di questo tavolo?', function() {
    delete TD[CT]; CC = 0; closeSheet();
  });
}

// ── REPORT ───────────────────────────────────────────────────
function renderReport() {
  var active = Object.keys(TD).filter(function(k){ return hasD(k); });
  var el = document.getElementById('repContent');
  if (!active.length) {
    el.innerHTML = '<div class="sempty"><p style="font-size:44px;margin-bottom:12px;opacity:.4">🍾</p><p>Nessuna bottiglia registrata.<br>Registra le bottiglie nella Mappa.</p></div>';
    return;
  }
  var now = new Date();
  var days = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
  var months = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  var ds = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
  var h = now.getHours(); var m = now.getMinutes();
  var ts = (h<10?'0':'')+h+':'+(m<10?'0':'')+m;

  var totalG = 0, totalS = 0;
  var spC = {}, sfC = {};
  active.forEach(function(id) {
    TD[id].clients.forEach(function(c) {
      c.bottles.forEach(function(b) {
        var q = parseInt(b.qty)||0; totalG += q;
        if (b.spirit) spC[b.spirit] = (spC[b.spirit]||0) + q;
      });
      Object.keys(c.softs).forEach(function(sid) {
        var v = c.softs[sid]; totalS += v;
        var sd = SOFTS.find(function(s){ return s.id === sid; });
        if (sd && v > 0) sfC[sd.n] = (sfC[sd.n]||0) + v;
      });
    });
  });

  var rows = '';
  active.forEach(function(id) {
    var t = TD[id];
    var tot = t.clients.reduce(function(s,c){ return s+totB(c); }, 0);
    rows += '<tr><td class="rmt">Tavolo '+id+'</td><td>'+t.clients.length+' cl.</td><td class="rnum">'+tot+'</td></tr>';
    t.clients.forEach(function(c) {
      var bots = c.bottles.filter(function(b){ return b.spirit; });
      if (!bots.length) return;
      var bs = bots.map(function(b){ return b.qty+'x '+b.spirit+(b.brand?' ('+b.brand+')':''); }).join(', ');
      var sf = Object.keys(c.softs).filter(function(sid){ return c.softs[sid]>0; }).map(function(sid) {
        var d = SOFTS.find(function(s){ return s.id===sid; });
        return c.softs[sid]+'x '+(d?d.n:sid);
      }).join(', ');
      rows += '<tr class="drow"><td colspan="3">'+c.num+'° cliente: '+bs+(sf?' · <em>'+sf+'</em>':'')+'</td></tr>';
    });
  });

  function pills(obj) {
    return Object.keys(obj).sort(function(a,b){ return obj[b]-obj[a]; }).map(function(k) {
      return '<span class="pill">'+k+' <b>'+obj[k]+'x</b></span>';
    }).join('');
  }

  el.innerHTML =
    '<div class="rtop"><div class="rbrand">Terrazza <b>21</b></div><div class="rsub">Rapporto di Turno</div><div class="rdate">'+ds+' · '+ts+'</div></div>' +
    '<div class="kpis"><div class="kpi"><div class="kval">'+totalG+'</div><div class="klbl">Bottiglie</div></div><div class="kpi"><div class="kval">'+active.length+'</div><div class="klbl">Tavoli</div></div><div class="kpi"><div class="kval">'+totalS+'</div><div class="klbl">Soft</div></div></div>' +
    '<div class="rsec"><div class="rslbl">Per tavolo</div><table class="rtable"><thead><tr><th>Tavolo</th><th>Clienti</th><th style="text-align:right">Bottiglie</th></tr></thead><tbody>'+rows+'</tbody></table></div>' +
    '<div class="rsec"><div class="rslbl">Spirits venduti</div><div class="pills">'+(pills(spC)||'—')+'</div></div>' +
    '<div class="rsec"><div class="rslbl">Soft drinks usciti</div><div class="pills">'+(pills(sfC)||'—')+'</div></div>' +
    '<div class="sbtns">' +
    '<button class="sbtn swa" onclick="shareWA()">' +
    '<svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>' +
    'Invia su WhatsApp</button>' +
    '<button class="sbtn scp" onclick="copyRep()">📋 Copia testo</button>' +
    '</div>';
}

function buildTxt() {
  var active = Object.keys(TD).filter(function(k){ return hasD(k); });
  if (!active.length) return '';
  var now = new Date();
  var days = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
  var months = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  var ds = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
  var h = now.getHours(); var m = now.getMinutes();
  var ts = (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
  var totalG = 0; var spC = {}, sfC = {};
  active.forEach(function(id) {
    TD[id].clients.forEach(function(c) {
      c.bottles.forEach(function(b){ var q=parseInt(b.qty)||0; totalG+=q; if(b.spirit) spC[b.spirit]=(spC[b.spirit]||0)+q; });
      Object.keys(c.softs).forEach(function(sid){ var d=SOFTS.find(function(s){ return s.id===sid; }); if(d&&c.softs[sid]>0) sfC[d.n]=(sfC[d.n]||0)+c.softs[sid]; });
    });
  });
  var txt = '🍾 *TERRAZZA DUOMO 21*\n📋 Rapporto di Turno\n📅 '+ds+' · '+ts+'\n\n*RIEPILOGO*\n• Bottiglie totali: *'+totalG+'*\n• Tavoli attivi: *'+active.length+'*\n\n*DETTAGLIO PER TAVOLO*\n';
  active.forEach(function(id) {
    var t=TD[id]; var tot=t.clients.reduce(function(s,c){ return s+totB(c); },0);
    txt+='\n🪑 *Tavolo '+id+'* — '+tot+' bottigli'+(tot===1?'a':'e')+'\n';
    t.clients.forEach(function(c) {
      var bots=c.bottles.filter(function(b){ return b.spirit; }); if(!bots.length) return;
      txt+='  '+c.num+'° cliente: '+bots.map(function(b){ return b.qty+'x '+b.spirit+(b.brand?' ('+b.brand+')':''); }).join(', ')+'\n';
      var sf=Object.keys(c.softs).filter(function(sid){ return c.softs[sid]>0; }).map(function(sid){ var d=SOFTS.find(function(s){ return s.id===sid; }); return c.softs[sid]+'x '+(d?d.n:sid); });
      if(sf.length) txt+='    Soft: '+sf.join(', ')+'\n';
    });
  });
  txt+='\n*SPIRITS*\n';
  Object.keys(spC).sort(function(a,b){ return spC[b]-spC[a]; }).forEach(function(s){ txt+='• '+s+': '+spC[s]+'x\n'; });
  if(Object.keys(sfC).length){ txt+='\n*SOFT DRINKS*\n'; Object.keys(sfC).sort(function(a,b){ return sfC[b]-sfC[a]; }).forEach(function(s){ txt+='• '+s+': '+sfC[s]+'x\n'; }); }
  return txt;
}

function shareWA() { var t=buildTxt(); if(!t) return; window.open('https://wa.me/?text='+encodeURIComponent(t),'_blank'); }
function copyRep() {
  var t=buildTxt(); if(!t) return;
  if(navigator.clipboard){ navigator.clipboard.writeText(t).then(function(){ showCov('Copiato!','Rapporto copiato negli appunti.',function(){}); }); }
  else { showCov('OK','Copia manuale necessaria.',function(){}); }
}

// ── CONFIRM ──────────────────────────────────────────────────
function showCov(title, msg, cb) {
  document.getElementById('ctitle').textContent = title;
  document.getElementById('cmsg').textContent = msg;
  CCB = cb;
  document.getElementById('cov').classList.add('on');
}
function closeCov() { document.getElementById('cov').classList.remove('on'); CCB = null; }
document.getElementById('cok').onclick = function() { if (CCB) CCB(); closeCov(); };

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  buildMap();
});
</script>
